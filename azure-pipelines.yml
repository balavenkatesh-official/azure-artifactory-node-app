trigger: 
- main

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      name: 'self-hosted'
    steps:
    - task: Npm@1
      inputs:
        command: 'custom'
        customCommand: 'install -D tailwindcss postcss autoprefixer'
    - task: Npm@1
      inputs:
        command: 'custom'
        customCommand: 'run build'

    - task: Npm@1
      inputs:
        command: 'publish'
        workingDir: './dist'
        publishRegistry: 'useFeed'
        publishFeed: 'd598db75-1034-4756-b4ce-e8ffc2af8632/02f925ab-2487-4de0-a80f-6b8bc1c65527'