trigger: 
- main

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      name: 'self-hosted'
    steps:
    - task: Npm@1
      inputs:
        command: 'custom'
        customCommand: 'install -D tailwindcss postcss autoprefixer'
    - task: Npm@1
      inputs:
        command: 'custom'
        customCommand: 'run build'

    - task: Npm@1
      inputs:
        command: 'publish'
        workingDir: './dist'
        publishRegistry: 'useFeed'
        publishFeed: '85e62de1-5c76-4b1f-ae41-ccdda14c4308'